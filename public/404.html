<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AElevate Business Innovations Hub</title>
    <script>
      // GitHub Pages SPA redirect: forward the path as a query param to index.html
      // so the app can read it and navigate to the right route.
      // Works alongside HashRouter as a belt-and-suspenders fallback.
      var path = window.location.pathname.slice(1)
      window.location.replace(
        window.location.origin + window.location.pathname.split('/').slice(0, -1).join('/') +
        '/#/' + path + window.location.search
      )
    </script>
  </head>
  <body></body>
</html>
